<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Creator Registration Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Theme toggle button -->
  <button type="button" id="themeToggle" class="theme-toggle">🌙 Dark Mode</button>
  <!-- Page header -->
  <h1>Digital Creator Registration Form</h1>
  <p>Join as a creator and start your digital journey</p>
  <!-- Main registration form -->
  <form novalidate>
    <!-- Progress indicator -->
    <div class="progress-area">
      <p id="stepText">Step 1 of 7</p>
      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>
    </div>
    <!-- Step 1: Personal information -->
    <fieldset class="form-step active">
      <legend>👤 Personal Information</legend>
      <div class="form-row">
        <div class="form-group">
          <div class="floating-group">
            <input type="text" name="fullName" placeholder=" " required />
            <label>Full Name</label>
          </div>
        </div>
        <div class="form-group">
          <div class="floating-group">
            <input type="email" name="email" placeholder=" " required />
            <label>Email Address</label>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <div class="floating-group">
            <input type="tel" name="phone" placeholder=" " required />
            <label>Phone Number</label>
          </div>
        </div>
        <div class="form-group">
          <div class="floating-group">
            <input type="text" name="location" placeholder=" " />
            <label>City / Country</label>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <div class="floating-group">
            <input type="date" name="dob" placeholder=" " />
            <label>Date of Birth</label>
          </div>
        </div>
      </div>
    </fieldset>
    <!-- Step 2: Creator profile -->
    <fieldset class="form-step">
      <legend>🎨 Creator Profile</legend>
      <div class="form-row">
        <div class="form-group">
          <div class="floating-group">
            <input type="text" name="brandName" placeholder=" " required />
            <label>Creator / Brand Name</label>
          </div>
        </div>
        <div class="form-group">
          <div class="floating-group">
            <select name="category" required>
              <option value="" disabled selected hidden></option>
              <option>Tech</option>
              <option>Education</option>
              <option>Vlogging</option>
              <option>Fitness</option>
              <option>Business</option>
              <option>Comedy</option>
              <option>AI / Digital</option>
              <option>Other</option>
            </select>
            <label>Content Category</label>
          </div>
        </div>
      </div>
      <div class="floating-group">
        <textarea name="bio" rows="4" placeholder=" "></textarea>
        <label>Short Bio</label>
      </div>
    </fieldset>
    <!-- Step 3: Social media links -->
    <fieldset class="form-step">
      <legend>📱 Social Media Links</legend>
      <div class="form-row">
        <div class="form-group">
          <div class="floating-group">
            <input type="url" name="youtube" placeholder=" " />
            <label>YouTube</label>
          </div>
        </div>
        <div class="form-group">
          <div class="floating-group">
            <input type="url" name="instagram" placeholder=" " />
            <label>Instagram</label>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <div class="floating-group">
            <input type="url" name="tiktok" placeholder=" " />
            <label>TikTok</label>
          </div>
        </div>
        <div class="form-group">
          <div class="floating-group">
            <input type="url" name="linkedin" placeholder=" " />
            <label>LinkedIn</label>
          </div>
        </div>
      </div>
    </fieldset>
    <!-- Step 4: Content style -->
    <fieldset class="form-step">
      <legend>💡 Content Style</legend>
      <div class="options">
        <label><input type="checkbox" name="style" value="education" /> Educational Videos</label>
        <label><input type="checkbox" name="style" value="entertainment" /> Entertainment</label>
        <label><input type="checkbox" name="style" value="tutorials" /> Tutorials</label>
        <label><input type="checkbox" name="style" value="motivation" /> Motivational Content</label>
        <label><input type="checkbox" name="style" value="ai" /> AI / Tech Content</label>
        <label><input type="checkbox" name="style" value="reviews" /> Product Reviews</label>
      </div>
    </fieldset>
    <!-- Step 5: Goals -->
    <fieldset class="form-step">
      <legend>🎯 Goals</legend>
      <div class="floating-group">
        <textarea name="creatorReason" rows="4" placeholder=" "></textarea>
        <label>Why do you want to become a creator?</label>
      </div>
      <label class="section-label">Your main goal:</label>
      <div class="options">
        <label><input type="radio" name="goal" value="fame" /> Fame</label>
        <label><input type="radio" name="goal" value="income" /> Income</label>
        <label><input type="radio" name="goal" value="brand" /> Personal Brand</label>
        <label><input type="radio" name="goal" value="business" /> Business Growth</label>
      </div>
    </fieldset>
    <!-- Step 6: Portfolio -->
    <fieldset class="form-step">
      <legend>📂 Portfolio</legend>
      <div class="form-row">
        <div class="form-group">
          <label class="section-label">Upload Sample Work:</label>
          <input type="file" name="portfolio" />
        </div>
        <div class="form-group">
          <div class="floating-group">
            <select name="experience">
              <option value="" disabled selected hidden></option>
              <option>Beginner</option>
              <option>Intermediate</option>
              <option>Professional</option>
            </select>
            <label>Experience Level</label>
          </div>
        </div>
      </div>
    </fieldset>
    <!-- Step 7: Consent -->
    <fieldset class="form-step">
      <legend>✅ Consent</legend>
      <label class="consent">
        <input type="checkbox" name="terms" required />
        I agree to terms and conditions
      </label>
    </fieldset>
    <!-- Form navigation buttons -->
    <div class="form-buttons">
      <button type="button" id="prevBtn">Previous</button>
      <button type="button" id="nextBtn">Next</button>
      <button type="button" id="firstStepBtn">First Step</button>
      <button type="submit" id="submitBtn">Submit Registration</button>
    </div>
  </form>
  <!-- Success popup -->
  <div class="success-popup" id="successPopup">
    <div class="popup-content">
      <h2>🎉 Registration Successful</h2>
      <p>Welcome to the Digital Creator Community</p>
      <button type="button" id="closePopup">Close</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
